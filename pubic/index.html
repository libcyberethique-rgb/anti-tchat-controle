<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tchat entre Potes</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background: #1e1e2e; color: #cdd6f4; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .container { width: 90%; max-width: 400px; height: 500px; background: #181825; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
    #login { display: flex; flex-direction: column; justify-content: center; padding: 20px; height: 100%; gap: 10px; }
    #chat { display: none; flex-direction: column; height: 100%; }
    .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; font-size: 14px; word-break: break-word; }
    .sent { background: #89b4fa; color: #11111b; align-self: flex-end; }
    .received { background: #313244; align-self: flex-start; }
    .system { font-size: 11px; color: #a6adc8; align-self: center; font-style: italic; }
    .author { font-weight: bold; font-size: 10px; color: #f5e0dc; display: block; }
    .input-box { display: flex; padding: 10px; background: #11111b; gap: 5px; }
    input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #45475a; background: #313244; color: #fff; }
    button { padding: 10px 15px; border-radius: 6px; border: none; background: #89b4fa; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <div class="container">
    <div id="login">
      <h2 style="text-align:center;">Rejoindre le Tchat</h2>
      <input type="text" id="pseudo" placeholder="Ton pseudo...">
      <button onclick="connecter()">Entrer</button>
    </div>

    <div id="chat">
      <div class="messages" id="msg-zone"></div>
      <div class="input-box">
        <input type="text" id="msg-input" placeholder="Message..." onkeypress="if(event.key==='Enter') envoyer()">
        <button onclick="envoyer()">Envoyer</button>
      </div>
    </div>
  </div>

  <script>
    const socket = io();

    function connecter() {
      const pseudo = document.getElementById('pseudo').value.trim();
      if (!pseudo) return;
      
      socket.emit('join', pseudo);
      document.getElementById('login').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
    }

    function envoyer() {
      const input = document.getElementById('msg-input');
      const txt = input.value.trim();
      if (!txt) return;

      socket.emit('chatMessage', txt);
      afficherMessage({ type: 'sent', text: txt });
      input.value = '';
    }

    socket.on('message', (data) => {
      afficherMessage(data);
    });

    function afficherMessage(data) {
      const zone = document.getElementById('msg-zone');
      const div = document.createElement('div');
      div.classList.add('msg', data.type);

      if (data.pseudo) {
        div.innerHTML = `<span class="author">${data.pseudo}</span>${data.text}`;
      } else {
        div.innerText = data.text;
      }

      zone.appendChild(div);
      zone.scrollTop = zone.scrollHeight;
    }
  </script>
</body>
</html>
